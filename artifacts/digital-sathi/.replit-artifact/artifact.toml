kind = "web"
previewPath = "/"
title = "Digital Sathi"
version = "1.0.0"
id = "artifacts/digital-sathi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20437

[services.development]
run = "pnpm --filter @workspace/digital-sathi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-sathi", "run", "build" ]
publicDir = "artifacts/digital-sathi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20437"
BASE_PATH = "/"
